baseURL = "https://etoile-bleu.github.io/matheo-blog/"
locale = "en-US"
title = "Matheo"
paginate = 20
enableRobotsTXT = true

[params]
  author = "Matheo"
  description = "A personal blog about tech, code, and ideas."
  tagline = "Thanks for stopping by."
  since = 2024
  # avatar = "/images/avatar.jpg"  # uncomment and add your photo to static/images/

  [params.social]
    github = "https://github.com/Etoile-Bleu"
    # twitter = "https://twitter.com/yourhandle"
    # mastodon = "https://mastodon.social/@yourhandle"
    # bluesky = "https://bsky.app/profile/yourhandle"
    # linkedin = "https://linkedin.com/in/yourhandle"

[markup]
  [markup.highlight]
    style = "github"
    lineNos = false
    codeFences = true
    noClasses = true
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML"]
  term = ["HTML"]

[outputFormats]
  [outputFormats.RSS]
    mediaType = "application/rss+xml"
    baseName = "feed"
    isPlainText = false
    rel = "alternate"
    isHTML = false

[taxonomies]
  tag = "tags"
