<style>
  #TableOfContents a {
    transition: color 0.2s ease;
  }
  #TableOfContents a.toc-active {
    color: rgb(var(--color-primary-600));
    border-left: 2px solid;
    padding-left: 6px;
    margin-left: -8px;
  }
  .dark #TableOfContents a.toc-active {
    color: rgb(var(--color-primary-400));
  }
</style>
<script>
  (() => {
    const container = document.getElementById("TableOfContents");
    if (!container) return;
    const links = container.querySelectorAll("a");
    if (links.length === 0) return;

    const targets = [];
    links.forEach((link) => {
      const id = link.getAttribute("href")?.slice(1);
      const el = id && document.getElementById(id);
      if (el) targets.push({ id, element: el, link });
    });
    if (targets.length === 0) return;

    const setActive = (target) => {
      links.forEach((link) => link.classList.remove("toc-active"));
      target?.link.classList.add("toc-active");
    };

    const observer = new IntersectionObserver(
      (entries) => {
        const visible = targets.filter((t) =>
          entries.some((e) => e.target === t.element && e.isIntersecting)
        );
        if (visible.length > 0) {
          setActive(visible[0]);
        } else {
          const scrollY = window.scrollY;
          let current = null;
          for (const t of targets) {
            if (t.element.offsetTop <= scrollY + 100) current = t;
          }
          if (current) setActive(current);
        }
      },
      { rootMargin: "-10% 0px -80% 0px", threshold: 0 }
    );
    targets.forEach((t) => observer.observe(t.element));
  })();
</script>
