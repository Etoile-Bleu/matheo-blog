{{ $paginator := .Paginator }}
{{ if gt $paginator.TotalPages 1 }}
<nav class="pagination">
  {{ if $paginator.HasPrev }}
  <a href="{{ $paginator.Prev.URL }}">&larr; Newer</a>
  {{ else }}
  <span></span>
  {{ end }}
  {{ if $paginator.HasNext }}
  <a href="{{ $paginator.Next.URL }}">Older &rarr;</a>
  {{ end }}
</nav>
{{ end }}
