<header class="py-6 sm:py-10 print:hidden">
  <div class="flex items-center justify-between">
    <a href="{{ "/" | relURL }}" class="text-base font-bold text-stone-900 hover:text-primary-600 dark:text-stone-100 dark:hover:text-primary-400 transition-colors">
      {{ .Site.Title }}
    </a>

    <nav class="hidden sm:flex items-center gap-5 text-sm font-medium text-stone-500 dark:text-stone-400">
      <a href="{{ "/posts" | relURL }}" class="hover:text-stone-900 dark:hover:text-stone-100 transition-colors">Posts</a>
      <a href="{{ "/tags" | relURL }}" class="hover:text-stone-900 dark:hover:text-stone-100 transition-colors">Tags</a>
      <a href="{{ "/about" | relURL }}" class="hover:text-stone-900 dark:hover:text-stone-100 transition-colors">About</a>
      <a href="{{ "feed.xml" | absURL }}" title="RSS Feed" aria-label="RSS" class="flex items-center hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
          <path d="M6.18 15.64a2.18 2.18 0 0 1 2.18 2.18C8.36 19.01 7.38 20 6.18 20C4.98 20 4 19.01 4 17.82a2.18 2.18 0 0 1 2.18-2.18M4 4.44A15.56 15.56 0 0 1 19.56 20h-2.83A12.73 12.73 0 0 0 4 7.27V4.44m0 5.66a9.9 9.9 0 0 1 9.9 9.9h-2.83A7.07 7.07 0 0 0 4 12.93V10.1z"/>
        </svg>
      </a>
      <button data-toggle="dark" aria-label="Toggle dark mode" class="flex items-center hover:text-primary-600 dark:hover:text-primary-400 transition-colors">
        <svg class="block dark:hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
        <svg class="hidden dark:block" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/>
        </svg>
      </button>
    </nav>

    <div class="flex items-center gap-3 sm:hidden">
      <button data-toggle="dark" aria-label="Toggle dark mode" class="text-stone-500 hover:text-primary-600 dark:text-stone-400 dark:hover:text-primary-400">
        <svg class="block dark:hidden" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="hidden dark:block" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
      <button id="mobile-menu-btn" aria-label="Open menu" class="text-stone-500 dark:text-stone-400">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
      </button>
    </div>
  </div>

  <nav id="mobile-menu" class="hidden mt-4 flex flex-col gap-3 text-sm font-medium text-stone-600 dark:text-stone-400 sm:hidden">
    <a href="{{ "/posts" | relURL }}" class="hover:text-stone-900 dark:hover:text-stone-100">Posts</a>
    <a href="{{ "/tags" | relURL }}" class="hover:text-stone-900 dark:hover:text-stone-100">Tags</a>
    <a href="{{ "/about" | relURL }}" class="hover:text-stone-900 dark:hover:text-stone-100">About</a>
    <a href="{{ "feed.xml" | absURL }}" class="hover:text-primary-600 dark:hover:text-primary-400">RSS</a>
  </nav>
</header>
