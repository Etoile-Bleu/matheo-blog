{{ define "main" }}
<article>
  <header class="mb-8">
    <h1 class="text-4xl font-extrabold leading-tight tracking-tight text-stone-900 dark:text-stone-100">{{ .Title }}</h1>
    <div class="mt-3 flex flex-wrap items-center gap-3 text-sm text-stone-500 dark:text-stone-400">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2 January 2006" }}</time>
      {{ if .Params.tags }}
      <div class="flex flex-wrap gap-1.5">
        {{ range .Params.tags }}
        <a href="{{ "/tags/" | relURL }}{{ . | urlize }}" class="rounded-full bg-stone-100 px-2.5 py-0.5 text-xs font-medium text-stone-600 hover:bg-primary-100 hover:text-primary-700 dark:bg-stone-800 dark:text-stone-300 dark:hover:bg-stone-700 dark:hover:text-primary-400 transition-colors">
          {{ . }}
        </a>
        {{ end }}
      </div>
      {{ end }}
    </div>
  </header>

  <div class="prose prose-lg dark:prose-invert max-w-prose">
    {{ .Content }}
  </div>
</article>
{{ end }}
