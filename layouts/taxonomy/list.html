{{ define "main" }}
<div class="container">
  <h1 class="section-title">Tags</h1>
  <ul class="tags-cloud">
    {{ range .Data.Terms.Alphabetical }}
    <li>
      <a href="{{ .Page.Permalink }}">
        {{ .Page.Title }}<span class="count">({{ .Count }})</span>
      </a>
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
