{{ define "main" }}
<div class="container">
  <h1 class="section-title">#{{ .Title }}</h1>
  
  <ul class="post-list">
    {{ range .Pages.ByDate.Reverse }}
    <li class="post-item">
      <time class="post-date" datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "Jan 02, 2006" }}</time>
      <a href="{{ .Permalink }}" class="post-link">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}
