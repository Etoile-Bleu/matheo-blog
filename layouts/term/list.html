{{ define "main" }}
<div class="container">
  <h1 class="section-title">#{{ .Title }}</h1>
  <ul class="post-list">
    {{ range .Pages }}
    <li class="post-item">
      <span class="post-date">{{ .Date.Format "Jan 02, 2006" }}</span>
      <a href="{{ .Permalink }}" class="post-title-link">{{ .Title }}</a>
    </li>
    {{ end }}
  </ul>
  {{ partial "pagination.html" . }}
</div>
{{ end }}
